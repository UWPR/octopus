<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Arial, Helvetica, sans-serif">
  <rect width="800" height="440" fill="#fff" rx="8"/>

  <!-- Title -->
  <text x="420" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Layout Plan Search: Skipping Dead-End Branches</text>
  <text x="420" y="42" text-anchor="middle" font-size="11" fill="#888">3 rows × 6 wells · 4 size-3 groups + 3 size-2 groups = 18 samples (exact fit)</text>
  <text x="420" y="56" text-anchor="middle" font-size="10" fill="#AAA">Only one layout plan works — pruning eliminates all other branches</text>

  <!-- Row background bands -->
  <rect x="0" y="100" width="800" height="90" fill="#f9f9f9" opacity="0.6"/>
  <rect x="0" y="236" width="800" height="100" fill="#f9f9f9" opacity="0.6"/>
  <rect x="0" y="346" width="800" height="50" fill="#f9f9f9" opacity="0.6"/>

  <!-- Row labels — left column with clear background -->
  <rect x="0" y="112" width="52" height="24" rx="3" fill="#E8E8E8"/>
  <text x="26" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Row A</text>

  <rect x="0" y="248" width="52" height="24" rx="3" fill="#E8E8E8"/>
  <text x="26" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Row B</text>

  <rect x="0" y="350" width="52" height="24" rx="3" fill="#E8E8E8"/>
  <text x="26" y="366" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Row C</text>

  <!-- Root -->
  <rect x="350" y="66" width="140" height="24" rx="12" fill="#E8E8E8" stroke="#BDBDBD"/>
  <text x="420" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#555">4 size-3 + 3 size-2</text>

  <!-- ═══ Level 1: Row A options ═══ -->
  <line x1="370" y1="90" x2="170" y2="112" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="420" y1="90" x2="420" y2="112" stroke="#F44336" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="470" y1="90" x2="640" y2="112" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- A1: size-3: 2 + size-2: 0 = 6 -->
  <rect x="70" y="112" width="200" height="34" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="170" y="127" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">size-3: 2 + size-2: 0 = 6</text>
  <text x="170" y="139" text-anchor="middle" font-size="8" fill="#388E3C">left: 2 size-3, 3 size-2</text>

  <!-- A2: size-3: 1 + size-2: 1 = 5  ← PRUNED -->
  <rect x="310" y="112" width="220" height="34" rx="5" fill="#FFEBEE" stroke="#F44336" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="420" y="127" text-anchor="middle" font-size="9" font-weight="600" fill="#C62828">size-3: 1 + size-2: 1 = 5</text>
  <text x="420" y="139" text-anchor="middle" font-size="8" fill="#C62828">left: 3 size-3, 2 size-2 = 13</text>

  <!-- Prune callout A2 -->
  <rect x="310" y="152" width="220" height="40" rx="4" fill="#FFEBEE" stroke="#EF9A9A" stroke-dasharray="3,2"/>
  <text x="420" y="164" text-anchor="middle" font-size="8" font-weight="700" fill="#C62828">✗ Capacity check fails</text>
  <text x="420" y="175" text-anchor="middle" font-size="7.5" fill="#D32F2F">13 samples left, only 2 rows × 6 = 12</text>
  <text x="420" y="188" text-anchor="middle" font-size="7.5" fill="#999">(all smaller combos also pruned)</text>

  <!-- A3: size-3: 0 + size-2: 3 = 6 -->
  <rect x="550" y="112" width="200" height="34" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="650" y="127" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">size-3: 0 + size-2: 3 = 6</text>
  <text x="650" y="139" text-anchor="middle" font-size="8" fill="#388E3C">left: 4 size-3, 0 size-2</text>

  <!-- ═══ Level 2: Row B from A1 ═══ -->
  <line x1="130" y1="146" x2="130" y2="248" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="200" y1="146" x2="330" y2="248" stroke="#F44336" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- B1: size-3: 0 + size-2: 3 = 6 -->
  <rect x="60" y="248" width="160" height="34" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="140" y="263" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">size-3: 0 + size-2: 3 = 6</text>
  <text x="140" y="275" text-anchor="middle" font-size="8" fill="#388E3C">left: 2 size-3, 0 size-2</text>

  <!-- B2: size-3: 1 + size-2: 1 = 5  ← PRUNED -->
  <rect x="240" y="248" width="190" height="34" rx="5" fill="#FFEBEE" stroke="#F44336" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="335" y="263" text-anchor="middle" font-size="9" font-weight="600" fill="#C62828">size-3: 1 + size-2: 1 = 5</text>
  <text x="335" y="275" text-anchor="middle" font-size="8" fill="#C62828">left: 1×3 + 2×2 = 7</text>

  <!-- Prune callout B2 -->
  <rect x="240" y="288" width="190" height="26" rx="4" fill="#FFEBEE" stroke="#EF9A9A" stroke-dasharray="3,2"/>
  <text x="335" y="300" text-anchor="middle" font-size="8" font-weight="700" fill="#C62828">✗ Capacity check fails</text>
  <text x="335" y="311" text-anchor="middle" font-size="7.5" fill="#D32F2F">7 samples left, 1 row × 6 = 6</text>

  <!-- ═══ Level 2: Row B from A3 ═══ -->
  <line x1="620" y1="146" x2="620" y2="248" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="680" y1="146" x2="740" y2="248" stroke="#F44336" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- B3: size-3: 2 + size-2: 0 = 6 -->
  <rect x="540" y="248" width="170" height="34" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="625" y="263" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">size-3: 2 + size-2: 0 = 6</text>
  <text x="625" y="275" text-anchor="middle" font-size="8" fill="#388E3C">left: 2 size-3, 0 size-2</text>

  <!-- B4: size-3: 1 + size-2: 0 = 3  ← PRUNED -->
  <rect x="720" y="248" width="70" height="34" rx="5" fill="#FFEBEE" stroke="#F44336" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="755" y="263" text-anchor="middle" font-size="8" font-weight="600" fill="#C62828">size-3: 1</text>
  <text x="755" y="275" text-anchor="middle" font-size="7" fill="#C62828">left: 9</text>

  <!-- Prune callout B4 -->
  <rect x="720" y="288" width="70" height="20" rx="4" fill="#FFEBEE" stroke="#EF9A9A" stroke-dasharray="3,2"/>
  <text x="755" y="302" text-anchor="middle" font-size="7.5" font-weight="700" fill="#C62828">✗ 9 > 6</text>

  <!-- ═══ Level 3: Row C completions ═══ -->
  <line x1="140" y1="282" x2="140" y2="350" stroke="#4CAF50" stroke-width="1.5"/>

  <rect x="60" y="350" width="160" height="30" rx="5" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="2"/>
  <text x="140" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#2E7D32">size-3: 2 + size-2: 0 = 6</text>
  <text x="140" y="376" text-anchor="middle" font-size="8" fill="#1B5E20">✓ Complete!</text>

  <line x1="625" y1="282" x2="625" y2="350" stroke="#4CAF50" stroke-width="1.5"/>

  <rect x="540" y="350" width="170" height="30" rx="5" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="2"/>
  <text x="625" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#2E7D32">size-3: 2 + size-2: 0 = 6</text>
  <text x="625" y="376" text-anchor="middle" font-size="8" fill="#1B5E20">✓ Complete (same plan)</text>

  <!-- Result callout -->
  <rect x="260" y="350" width="260" height="30" rx="5" fill="#E3F2FD" stroke="#90CAF9"/>
  <text x="390" y="365" text-anchor="middle" font-size="9" font-weight="600" fill="#1565C0">Both paths yield the same layout plan:</text>
  <text x="390" y="376" text-anchor="middle" font-size="9" fill="#1976D2">two rows of 2×size-3, one row of 3×size-2</text>

  <!-- Legend -->
  <rect x="20" y="406" width="760" height="28" rx="4" fill="#F8F8F8" stroke="#E8E8E8"/>
  <rect x="30" y="413" width="14" height="14" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="50" y="424" font-size="9" fill="#555">Valid branch</text>
  <rect x="130" y="413" width="14" height="14" rx="2" fill="#FFEBEE" stroke="#F44336" stroke-dasharray="3,2"/>
  <text x="150" y="424" font-size="9" fill="#555">Pruned — can't lead to a complete assignment</text>
  <text x="470" y="424" font-size="9" fill="#888">Row permutations are deduplicated — only one unique layout plan survives</text>
</svg>
