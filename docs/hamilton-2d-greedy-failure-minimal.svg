<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 750" font-family="Consolas, monospace" font-size="13">
  <!-- White background -->
  <rect width="820" height="750" fill="white"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="16" font-weight="bold">Minimal Example: Greedy Remainder Distribution Fails</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 1: Setup -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="65" font-size="14" font-weight="bold" fill="#333">Setup</text>

  <text x="30" y="90" font-size="12">3 blocks, each with capacity 2 (total capacity = 6)</text>
  <text x="30" y="110" font-size="12">3 groups, each with 2 samples (total samples = 6)</text>
  <text x="30" y="130" font-size="12">Every cell quota = groupSize × blockCap / totalCap = 2×2/6 = 0.667</text>
  <text x="30" y="150" font-size="12">Every floor = 0, every remainder = 0.667</text>
  <text x="30" y="170" font-size="12">All floors are zero → every sample must be placed via the +1 remainder awards.</text>
  <text x="30" y="190" font-size="12">Need to award 6 total +1s: exactly 2 per group (row) and 2 per block (column).</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 2: The matrix -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="225" font-size="14" font-weight="bold" fill="#333">Quota Matrix (all cells identical)</text>

  <!-- Column headers -->
  <text x="200" y="255" font-size="11" font-weight="bold" text-anchor="middle">Block 0 (cap=2)</text>
  <text x="370" y="255" font-size="11" font-weight="bold" text-anchor="middle">Block 1 (cap=2)</text>
  <text x="540" y="255" font-size="11" font-weight="bold" text-anchor="middle">Block 2 (cap=2)</text>
  <text x="680" y="255" font-size="11" font-weight="bold" text-anchor="middle">Needs</text>

  <line x1="80" y1="262" x2="730" y2="262" stroke="#ccc" stroke-width="1"/>

  <!-- Row G0 -->
  <text x="30" y="285" font-size="11" font-weight="bold">G0 (2 samples)</text>
  <rect x="150" y="270" width="100" height="22" rx="3" fill="#fff3e0" stroke="#FF9800" stroke-width="1"/>
  <text x="200" y="286" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <rect x="320" y="270" width="100" height="22" rx="3" fill="#fff3e0" stroke="#FF9800" stroke-width="1"/>
  <text x="370" y="286" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <rect x="490" y="270" width="100" height="22" rx="3" fill="#fff3e0" stroke="#FF9800" stroke-width="1"/>
  <text x="540" y="286" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <text x="680" y="286" font-size="11" text-anchor="middle">+2</text>

  <!-- Row G1 -->
  <text x="30" y="315" font-size="11" font-weight="bold">G1 (2 samples)</text>
  <rect x="150" y="300" width="100" height="22" rx="3" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1"/>
  <text x="200" y="316" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <rect x="320" y="300" width="100" height="22" rx="3" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1"/>
  <text x="370" y="316" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <rect x="490" y="300" width="100" height="22" rx="3" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1"/>
  <text x="540" y="316" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <text x="680" y="316" font-size="11" text-anchor="middle">+2</text>

  <!-- Row G2 -->
  <text x="30" y="345" font-size="11" font-weight="bold">G2 (2 samples)</text>
  <rect x="150" y="330" width="100" height="22" rx="3" fill="#e3f2fd" stroke="#2196F3" stroke-width="1"/>
  <text x="200" y="346" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <rect x="320" y="330" width="100" height="22" rx="3" fill="#e3f2fd" stroke="#2196F3" stroke-width="1"/>
  <text x="370" y="346" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <rect x="490" y="330" width="100" height="22" rx="3" fill="#e3f2fd" stroke="#2196F3" stroke-width="1"/>
  <text x="540" y="346" font-size="10" text-anchor="middle">0.667 → fl 0</text>
  <text x="680" y="346" font-size="11" text-anchor="middle">+2</text>

  <!-- Block deficit row -->
  <line x1="80" y1="358" x2="730" y2="358" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="378" font-size="11" fill="#666">Block needs:</text>
  <text x="200" y="378" font-size="11" fill="#D32F2F" font-weight="bold" text-anchor="middle">+2</text>
  <text x="370" y="378" font-size="11" fill="#D32F2F" font-weight="bold" text-anchor="middle">+2</text>
  <text x="540" y="378" font-size="11" fill="#D32F2F" font-weight="bold" text-anchor="middle">+2</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 3: Greedy failure trace -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="418" font-size="14" font-weight="bold" fill="#D32F2F">Greedy by largest remainder — one bad ordering</text>

  <text x="30" y="442" font-size="11" fill="#555">All 9 cells have the same remainder (0.667). Order depends on random shuffle.</text>
  <text x="30" y="460" font-size="11" fill="#555">Suppose the shuffle produces this order:</text>

  <!-- Step-by-step trace -->
  <rect x="30" y="472" width="760" height="195" rx="4" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <text x="45" y="492" font-size="11" fill="#388E3C">Step 1: (G0, B0) — G0 needs +2 ✓, B0 needs +2 ✓ → award.  G0 needs +1, B0 needs +1</text>
  <text x="45" y="512" font-size="11" fill="#388E3C">Step 2: (G0, B1) — G0 needs +1 ✓, B1 needs +2 ✓ → award.  G0 done,   B1 needs +1</text>
  <text x="45" y="532" font-size="11" fill="#388E3C">Step 3: (G1, B1) — G1 needs +2 ✓, B1 needs +1 ✓ → award.  G1 needs +1, B1 done</text>
  <text x="45" y="552" font-size="11" fill="#388E3C">Step 4: (G1, B0) — G1 needs +1 ✓, B0 needs +1 ✓ → award.  G1 done,   B0 done</text>
  <text x="45" y="572" font-size="11" fill="#888">Step 5: (G0, B2) — G0 already done, skip</text>
  <text x="45" y="592" font-size="11" fill="#888">Step 6: (G1, B2) — G1 already done, skip</text>
  <text x="45" y="612" font-size="11" fill="#D32F2F" font-weight="bold">Step 7: (G2, B0) — G2 needs +2 ✓, B0 needs +0 ✗ → skip</text>
  <text x="45" y="632" font-size="11" fill="#D32F2F" font-weight="bold">Step 8: (G2, B1) — G2 needs +2 ✓, B1 needs +0 ✗ → skip</text>
  <text x="45" y="652" font-size="11" fill="#388E3C">Step 9: (G2, B2) — G2 needs +2 ✓, B2 needs +2 ✓ → award.  G2 needs +1, B2 needs +1</text>

  <text x="30" y="685" font-size="12" fill="#D32F2F" font-weight="bold">Result: G2 still needs +1, B2 still needs +1, but (G2,B2) was already used. 1 sample unplaced!</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SECTION 4: Correct solution -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="720" font-size="14" font-weight="bold" fill="#1565C0">Correct solution (any of these works)</text>
  <text x="30" y="743" font-size="11">Each group on exactly 2 of the 3 blocks: e.g. G0→(B0,B1), G1→(B0,B2), G2→(B1,B2). Requires swap repair or backtracking.</text>
</svg>
