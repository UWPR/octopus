<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 370" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect width="760" height="370" fill="#fff" rx="8"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Row Layout Plan: Assigning Subject Groups to Rows</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#888">3 rows × 7 wells · 4 size-3 groups + 3 size-2 groups + 3 singletons = 21 samples</text>

  <!-- Left side: Input groups -->
  <text x="20" y="78" font-size="12" font-weight="600" fill="#555">Subject Groups</text>

  <!-- Size-3 groups -->
  <rect x="20" y="88" width="90" height="22" rx="4" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="65" y="103" text-anchor="middle" font-size="11" fill="#2E7D32">4 × size 3</text>

  <!-- Size-2 groups -->
  <rect x="120" y="88" width="90" height="22" rx="4" fill="#2196F3" opacity="0.15" stroke="#2196F3" stroke-width="1.5"/>
  <text x="165" y="103" text-anchor="middle" font-size="11" fill="#1565C0">3 × size 2</text>

  <!-- Singletons -->
  <rect x="220" y="88" width="100" height="22" rx="4" fill="#9E9E9E" opacity="0.15" stroke="#9E9E9E" stroke-width="1.5"/>
  <text x="270" y="103" text-anchor="middle" font-size="11" fill="#616161">3 singletons</text>

  <!-- Arrow down -->
  <line x1="180" y1="118" x2="180" y2="138" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>

  <!-- Phase 1 label -->
  <text x="20" y="158" font-size="12" font-weight="600" fill="#555">Phase 1: Find Layout Plan</text>
  <text x="20" y="173" font-size="10" fill="#888">(how many groups of each size per row — singletons placed after)</text>

  <!-- Layout plan table -->
  <rect x="20" y="182" width="330" height="120" rx="4" fill="#F5F5F5" stroke="#E0E0E0"/>

  <!-- Header row -->
  <rect x="20" y="182" width="330" height="22" rx="4" fill="#E8E8E8"/>
  <text x="85" y="197" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Row</text>
  <text x="185" y="197" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Size-3 groups</text>
  <text x="285" y="197" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Size-2 groups</text>

  <!-- Row A -->
  <text x="85" y="219" text-anchor="middle" font-size="11" fill="#333">Row A (cap 7)</text>
  <text x="185" y="219" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">2</text>
  <text x="285" y="219" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">0</text>
  <text x="340" y="219" text-anchor="end" font-size="9" fill="#999">= 6</text>

  <!-- Row B -->
  <text x="85" y="243" text-anchor="middle" font-size="11" fill="#333">Row B (cap 7)</text>
  <text x="185" y="243" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">1</text>
  <text x="285" y="243" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">2</text>
  <text x="340" y="243" text-anchor="end" font-size="9" fill="#999">= 7</text>

  <!-- Row C -->
  <text x="85" y="267" text-anchor="middle" font-size="11" fill="#333">Row C (cap 7)</text>
  <text x="185" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">1</text>
  <text x="285" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">1</text>
  <text x="340" y="267" text-anchor="end" font-size="9" fill="#999">= 5</text>

  <!-- Singletons note -->
  <text x="30" y="294" font-size="9" fill="#888">+ 3 singletons fill remaining wells: 1 in Row A, 0 in Row B, 2 in Row C</text>

  <!-- Arrow right -->
  <line x1="365" y1="240" x2="395" y2="240" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Phase 2: Right side plate visualization -->
  <text x="410" y="158" font-size="12" font-weight="600" fill="#555">Phase 2: Assign Specific Groups</text>
  <text x="410" y="173" font-size="10" fill="#888">(assign patients to rows for best covariate balance)</text>

  <!-- Plate grid — each cell = 36px wide, 7 cells = 252px, starting at x=440 -->
  <rect x="410" y="182" width="335" height="120" rx="4" fill="#FAFAFA" stroke="#E0E0E0"/>

  <!-- Column guides (light lines at each cell boundary) -->
  <line x1="440" y1="195" x2="440" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>
  <line x1="478" y1="195" x2="478" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>
  <line x1="516" y1="195" x2="516" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>
  <line x1="554" y1="195" x2="554" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>
  <line x1="592" y1="195" x2="592" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>
  <line x1="630" y1="195" x2="630" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>
  <line x1="668" y1="195" x2="668" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>
  <line x1="706" y1="195" x2="706" y2="296" stroke="#E8E8E8" stroke-width="0.5"/>

  <!-- Row A: P03 ×3 (cols 1-3) + P01 ×3 (cols 4-6) + singleton (col 7) = 7 -->
  <text x="424" y="214" font-size="11" font-weight="700" fill="#555">A</text>
  <rect x="440" y="198" width="112" height="26" rx="3" fill="#4CAF50" opacity="0.8"/>
  <text x="496" y="215" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">P03 ×3</text>
  <rect x="556" y="198" width="112" height="26" rx="3" fill="#4CAF50" opacity="0.6"/>
  <text x="612" y="215" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">P01 ×3</text>
  <rect x="672" y="198" width="34" height="26" rx="3" fill="#9E9E9E" opacity="0.5"/>
  <text x="689" y="215" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">s</text>

  <!-- Row B: P04 ×3 (cols 1-3) + P06 ×2 (cols 4-5) + P05 ×2 (cols 6-7) = 7 -->
  <text x="424" y="248" font-size="11" font-weight="700" fill="#555">B</text>
  <rect x="440" y="232" width="112" height="26" rx="3" fill="#4CAF50" opacity="0.8"/>
  <text x="496" y="249" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">P04 ×3</text>
  <rect x="556" y="232" width="72" height="26" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="592" y="249" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">P06 ×2</text>
  <rect x="632" y="232" width="72" height="26" rx="3" fill="#2196F3" opacity="0.6"/>
  <text x="668" y="249" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">P05 ×2</text>

  <!-- Row C: P02 ×3 (cols 1-3) + P07 ×2 (cols 4-5) + singleton (col 6) + singleton (col 7) = 7 -->
  <text x="424" y="282" font-size="11" font-weight="700" fill="#555">C</text>
  <rect x="440" y="266" width="112" height="26" rx="3" fill="#4CAF50" opacity="0.8"/>
  <text x="496" y="283" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">P02 ×3</text>
  <rect x="556" y="266" width="72" height="26" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="592" y="283" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">P07 ×2</text>
  <rect x="632" y="266" width="34" height="26" rx="3" fill="#9E9E9E" opacity="0.5"/>
  <text x="649" y="283" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">s</text>
  <rect x="670" y="266" width="34" height="26" rx="3" fill="#9E9E9E" opacity="0.5"/>
  <text x="687" y="283" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">s</text>

  <!-- Legend -->
  <rect x="20" y="322" width="720" height="38" rx="4" fill="#F8F8F8" stroke="#E8E8E8"/>
  <rect x="30" y="333" width="14" height="14" rx="2" fill="#4CAF50" opacity="0.8"/>
  <text x="50" y="344" font-size="10" fill="#555">Size-3 subject group (3 wells)</text>
  <rect x="220" y="333" width="14" height="14" rx="2" fill="#2196F3" opacity="0.8"/>
  <text x="240" y="344" font-size="10" fill="#555">Size-2 subject group (2 wells)</text>
  <rect x="410" y="333" width="14" height="14" rx="2" fill="#9E9E9E" opacity="0.5"/>
  <text x="430" y="344" font-size="10" fill="#555">Singleton (1 well)</text>
  <text x="560" y="344" font-size="10" fill="#888">Every row fills all 7 wells</text>
</svg>
